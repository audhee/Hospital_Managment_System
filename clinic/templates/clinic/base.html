<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Namma Hospital HMS</title>
    <style>
        .navbar-brand { font-weight: bold; }
        .nav-link { font-weight: 500; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Namma Hospital</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <a class="nav-link" href="{% url 'home' %}">Home</a>

                        {% if user.is_doctor %}
                            <a class="nav-link text-warning" href="{% url 'doctor_dashboard' %}">👨‍⚕️ Doctor Panel</a>
                        {% else %}
                            <a class="nav-link" href="{% url 'doctor_list' %}">Find Doctors</a>
                            <a class="nav-link" href="{% url 'patient_dashboard' %}">My Dashboard</a>
                        {% endif %}

                        <span class="nav-link text-info ms-lg-3">| Hi, {{ user.username }}</span>
                        
                        <form action="{% url 'logout' %}" method="post" class="d-inline ms-lg-2">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                        </form>
                    {% else %}
                        <a class="nav-link" href="{% url 'login' %}">Login</a>
                        <a class="nav-link btn btn-primary btn-sm text-white ms-lg-2 px-3" href="{% url 'signup' %}">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
